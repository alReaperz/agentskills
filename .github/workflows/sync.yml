name: Upstream Sync
permissions:
  contents: write
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          target_repo_token: \${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: agentskills/agentskills
          upstream_sync_branch: main